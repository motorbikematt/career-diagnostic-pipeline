# screen.yaml — the screening subagent's output (six-second / three-minute
# stress test). Produced WITHOUT the WHD in context, by construction. The two
# triggers are the report's most actionable diagnostic (plan section 3).
type: object
required: [first_friction_trigger, first_escalation_trigger, escalation_likelihood]
properties:
  first_friction_trigger: {type: str}    # verbatim, leads the report analysis
  first_escalation_trigger: {type: str}  # verbatim
  gate1: {type: str}                     # pass | fail  (recruiter 6-second scan)
  gate2: {type: str}                     # pass | fail  (hiring-manager 3-minute read)
  elimination_logic: {type: str}
  hm_acceptance_risk: {type: str}
  escalation_likelihood: {type: str}     # low | medium | high
